name: Live Match Updater
on:
  schedule:
    - cron: '*/20 * * * *' # السطر 8 الآن منسق بشكل سليم
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # إعطاء صلاحية الكتابة للمستودع
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Requests
        run: pip install requests

      - name: Run Updater
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python update_data.py

    - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. إخبار Git بتجاهل التغييرات الحالية مؤقتاً لسحب التحديثات
          git add api.json
          git stash
          
          # 2. سحب أي تحديثات جديدة من السيرفر (مثل تعديلاتك اليدوية)
          git pull origin main --rebase
          
          # 3. استعادة الملف الذي أنشأه السكريبت ووضعه فوق النسخة المسحوبة
          git stash pop || echo "No changes to pop"
          
          # 4. الرفع النهائي للسيرفر
          git add api.json
          git commit -m "Update live matches" || exit 0
          git push origin main
          
          # 4. الرفع النهائي
          git add api.json
          git commit -m "Update live matches" || exit 0
          git push origin main
