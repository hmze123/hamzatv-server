name: Live Match Updater
on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Requests
        run: pip install requests

      - name: Run Updater
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python update_data.py

      - name: Commit and Push
  run: |
    git config --local user.email "action@github.com"
    git config --local user.name "GitHub Action"
    
    # Configure the origin remote if it doesn't exist
    git remote add origin https://github.com/${{ github.repository }}.git || true
    git remote set-url origin https://github.com/${{ github.repository }}.git
    
    # جلب النسخة الأخيرة من السيرفر وتجاهل أي تعارض محلي
    git fetch origin main
    git reset --mixed origin/main
    
    # إضافة الملف المحدث الآن
    git add api.json
    
    # محاولة الحفظ، وإذا لم يوجد تغيير لن يتوقف السكريبت
    git commit -m "Update live matches" || echo "No changes to commit"
    
    # الرفع بقوة (Force Push) لإنهاء مشكلة الـ rejected تماماً
    git push origin main --force
